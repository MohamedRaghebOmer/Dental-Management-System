name: .NET CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore Dental.slnx

      - name: Build Solution
        run: dotnet build Dental.slnx --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Dental.slnx --configuration Release --no-build --verbosity normal
